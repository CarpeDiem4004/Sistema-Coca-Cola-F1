<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coca-Cola F1 – Painel da Base</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root { --cc-red: #d40000; }
    body  { background: #f5f5f5; }
    .navbar { background: var(--cc-red) !important; }
    .navbar-brand { font-weight: 900; letter-spacing: 1px; font-size: 1.3rem; }
    .nav-tab-btn { cursor: pointer; padding: 8px 18px; border-radius: 8px 8px 0 0; background: #eee; border: none; font-weight: 600; }
    .nav-tab-btn.active { background: var(--cc-red); color: #fff; }
    .card-stat { border-left: 5px solid var(--cc-red); border-radius: 10px; }
    .btn-red { background: var(--cc-red); color: #fff; border: none; }
    .btn-red:hover { background: #b50000; color: #fff; }
    .rota-card { border: 1px solid #dee2e6; border-radius: 10px; padding: 16px; margin-bottom: 12px; background: #fff; }
    .rota-card .rota-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section { display: none; } .section.active { display: block; }
    .badge-desconto { background: #ff6b35; color: #fff; }
    table th { background: #f8d7d7; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand"><i class="bi bi-truck me-2"></i>Coca-Cola F1</span>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white fw-semibold" id="nomeBase"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
  </div>
</nav>

<div class="container-fluid py-4 px-4">

  <!-- Tabs -->
  <div class="d-flex gap-2 mb-0">
    <button class="nav-tab-btn active" onclick="showTab('relatorio')"><i class="bi bi-file-earmark-text me-1"></i>Relatório F1</button>
    <button class="nav-tab-btn" onclick="showTab('funcionarios')"><i class="bi bi-people me-1"></i>Funcionários</button>
    <button class="nav-tab-btn" onclick="showTab('historico')"><i class="bi bi-clock-history me-1"></i>Histórico</button>
  </div>

  <!-- ════════════════ TAB: RELATÓRIO F1 ════════════════ -->
  <div id="tab-relatorio" class="section active bg-white rounded-bottom rounded-end p-4 shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-file-earmark-text text-danger me-2"></i>Enviar Relatório F1 (D-1)</h5>
      <div class="d-flex align-items-center gap-2">
        <label class="fw-semibold">Data de referência:</label>
        <input type="date" id="dataRef" class="form-control form-control-sm" style="width:160px" />
      </div>
    </div>

    <div id="avisoJaPostou" class="alert alert-success d-none">
      <i class="bi bi-check-circle-fill me-2"></i>Relatório já enviado para esta data.
    </div>
    <div id="alertaRel" class="alert d-none"></div>

    <div id="listaRotas"></div>

    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-outline-secondary btn-sm" onclick="addRota()"><i class="bi bi-plus-circle me-1"></i>Adicionar Rota</button>
      <button class="btn btn-red" onclick="enviarRelatorio()"><i class="bi bi-send-fill me-2"></i>Enviar Relatório</button>
    </div>
  </div>

  <!-- ════════════════ TAB: FUNCIONÁRIOS ════════════════ -->
  <div id="tab-funcionarios" class="section bg-white rounded-bottom rounded-end p-4 shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-people text-danger me-2"></i>Motoristas e Ajudantes</h5>
      <button class="btn btn-red btn-sm" data-bs-toggle="modal" data-bs-target="#modalFunc">
        <i class="bi bi-person-plus me-1"></i>Cadastrar
      </button>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <h6 class="text-danger fw-bold"><i class="bi bi-truck me-1"></i>Motoristas</h6>
        <table class="table table-bordered table-hover table-sm">
          <thead><tr><th>Nome</th><th>CPF</th><th></th></tr></thead>
          <tbody id="tbMotoristas"></tbody>
        </table>
      </div>
      <div class="col-md-6">
        <h6 class="text-danger fw-bold"><i class="bi bi-person-fill me-1"></i>Ajudantes</h6>
        <table class="table table-bordered table-hover table-sm">
          <thead><tr><th>Nome</th><th>CPF</th><th></th></tr></thead>
          <tbody id="tbAjudantes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ════════════════ TAB: HISTÓRICO ════════════════ -->
  <div id="tab-historico" class="section bg-white rounded-bottom rounded-end p-4 shadow-sm">
    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history text-danger me-2"></i>Histórico de Relatórios</h5>
    <table class="table table-bordered table-hover">
      <thead><tr><th>Data Ref.</th><th>Postado em</th><th>Rotas</th><th></th></tr></thead>
      <tbody id="tbHistorico"></tbody>
    </table>
  </div>

</div><!-- /container -->

<!-- Modal: cadastrar funcionário -->
<div class="modal fade" id="modalFunc" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--cc-red)">
        <h5 class="modal-title text-white fw-bold"><i class="bi bi-person-plus me-2"></i>Cadastrar Funcionário</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="alertaFunc" class="alert d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Nome completo *</label>
          <input type="text" id="fNome" class="form-control" placeholder="Nome do funcionário" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Cargo *</label>
          <select id="fCargo" class="form-select">
            <option value="motorista">Motorista</option>
            <option value="ajudante">Ajudante</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">CPF</label>
          <input type="text" id="fCpf" class="form-control" placeholder="000.000.000-00" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-red" onclick="salvarFuncionario()"><i class="bi bi-check-lg me-1"></i>Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: detalhe relatório -->
<div class="modal fade" id="modalDetalhe" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--cc-red)">
        <h5 class="modal-title text-white fw-bold"><i class="bi bi-file-earmark-bar-graph me-2"></i>Detalhe do Relatório</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="corpoDetalhe"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Estado ──────────────────────────────────────────────────────────────────
let funcionarios = [];
let rotaIdx = 0;

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
  if (!me || me.erro) { window.location.href = '/'; return; }
  if (me.isAdmin)     { window.location.href = '/admin'; return; }
  document.getElementById('nomeBase').textContent = me.nome;

  // data padrão = ontem (D-1)
  const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
  document.getElementById('dataRef').value = ontem.toISOString().slice(0, 10);
  document.getElementById('dataRef').addEventListener('change', verificarData);

  await carregarFuncionarios();
  await carregarHistorico();
  addRota();
  await verificarData();
})();

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── Funcionários ─────────────────────────────────────────────────────────────
async function carregarFuncionarios() {
  funcionarios = await fetch('/api/funcionarios').then(r => r.json());
  renderFuncionarios();
}

function renderFuncionarios() {
  ['motorista', 'ajudante'].forEach(cargo => {
    const tb = document.getElementById(cargo === 'motorista' ? 'tbMotoristas' : 'tbAjudantes');
    const lista = funcionarios.filter(f => f.cargo === cargo);
    tb.innerHTML = lista.length === 0
      ? '<tr><td colspan="3" class="text-center text-muted">Nenhum cadastrado</td></tr>'
      : lista.map(f => `
          <tr>
            <td>${f.nome}</td>
            <td>${f.cpf || '—'}</td>
            <td><button class="btn btn-outline-danger btn-sm" onclick="removerFunc(${f.id})"><i class="bi bi-trash"></i></button></td>
          </tr>`).join('');
  });
  // atualizar selects de rotas
  document.querySelectorAll('.sel-motorista, .sel-ajudante, .sel-ajudante2').forEach(sel => {
    const tipo = sel.classList.contains('sel-motorista') ? 'motorista' : 'ajudante';
    const val  = sel.value;
    sel.innerHTML = `<option value="">— selecionar —</option>` +
      funcionarios.filter(f => f.cargo === tipo).map(f => `<option value="${f.id}" ${f.id == val ? 'selected' : ''}>${f.nome}</option>`).join('');
  });
}

async function salvarFuncionario() {
  const nome  = document.getElementById('fNome').value.trim();
  const cargo = document.getElementById('fCargo').value;
  const cpf   = document.getElementById('fCpf').value.trim();
  const alerta = document.getElementById('alertaFunc');

  if (!nome) { alerta.className='alert alert-danger'; alerta.textContent='Nome obrigatório.'; return; }

  const res  = await fetch('/api/funcionarios', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({nome, cargo, cpf}) });
  const data = await res.json();
  if (!res.ok) { alerta.className='alert alert-danger'; alerta.textContent=data.erro; return; }

  alerta.className='alert alert-success'; alerta.textContent='Funcionário cadastrado!';
  document.getElementById('fNome').value = '';
  document.getElementById('fCpf').value  = '';
  await carregarFuncionarios();
  setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('modalFunc')).hide(), 1000);
}

async function removerFunc(id) {
  if (!confirm('Desativar este funcionário?')) return;
  await fetch(`/api/funcionarios/${id}`, { method:'DELETE' });
  await carregarFuncionarios();
}

// ── Rotas ─────────────────────────────────────────────────────────────────────
function addRota() {
  const idx = ++rotaIdx;
  const div = document.createElement('div');
  div.className = 'rota-card';
  div.id = `rota-${idx}`;
  div.innerHTML = `
    <div class="rota-header">
      <span class="fw-bold text-danger"><i class="bi bi-signpost-2 me-1"></i>Rota #<span class="rota-num">${idx}</span></span>
      <button class="btn btn-outline-danger btn-sm" onclick="removerRota(${idx})"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="row g-2">
      <div class="col-md-2">
        <label class="form-label small fw-semibold">Nº da Rota *</label>
        <input type="text" class="form-control form-control-sm inp-rota" placeholder="Ex: R001" />
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-semibold">Nº da F1</label>
        <input type="text" class="form-control form-control-sm inp-f1" placeholder="Ex: F001" />
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-semibold"><i class="bi bi-truck me-1 text-danger"></i>Motorista</label>
        <select class="form-select form-select-sm sel-motorista">
          <option value="">— selecionar —</option>
          ${funcionarios.filter(f=>f.cargo==='motorista').map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold"><i class="bi bi-person me-1 text-danger"></i>Ajudante 1</label>
        <select class="form-select form-select-sm sel-ajudante">
          <option value="">— selecionar —</option>
          ${funcionarios.filter(f=>f.cargo==='ajudante').map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold"><i class="bi bi-person me-1 text-danger"></i>Ajudante 2</label>
        <select class="form-select form-select-sm sel-ajudante2">
          <option value="">— selecionar —</option>
          ${funcionarios.filter(f=>f.cargo==='ajudante').map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="row g-2 mt-1">
      <div class="col-md-4">
        <label class="form-label small fw-semibold">Mercadorias Faltando</label>
        <input type="text" class="form-control form-control-sm inp-faltando" placeholder="Ex: 10cx Coca 2L, 5cx Fanta" />
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold"><i class="bi bi-paperclip me-1"></i>Anexar NF <span class="text-muted small">(PDF/Imagem)</span></label>
        <div class="d-flex gap-1 align-items-center">
          <input type="file" class="form-control form-control-sm inp-nf-file" accept=".pdf,.jpg,.jpeg,.png,.webp" />
          <span class="inp-nf-status small"></span>
        </div>
        <input type="hidden" class="inp-nf-url" />
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input chk-desconto" type="checkbox" id="desc-${idx}" />
          <label class="form-check-label fw-semibold text-danger" for="desc-${idx}">Equipe sofrerá desconto?</label>
        </div>
      </div>
      <div class="col-md-1">
        <label class="form-label small fw-semibold">Vl. Desconto</label>
        <input type="number" class="form-control form-control-sm inp-valor-desconto" min="0" step="0.01" value="0" />
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-semibold">Motivo / Observações</label>
        <input type="text" class="form-control form-control-sm inp-motivo" placeholder="Descreva o motivo ou obs." />
      </div>
    </div>`;
  document.getElementById('listaRotas').appendChild(div);
}

function removerRota(idx) {
  const el = document.getElementById(`rota-${idx}`);
  if (el) el.remove();
  // Re-numerar
  document.querySelectorAll('.rota-card .rota-num').forEach((el, i) => el.textContent = i + 1);
}

// ── Verificar se já postou ───────────────────────────────────────────────────
async function verificarData() {
  const data = document.getElementById('dataRef').value;
  const res  = await fetch(`/api/relatorios?data=${data}`).then(r => r.json());
  const aviso = document.getElementById('avisoJaPostou');
  if (res.length > 0) {
    aviso.classList.remove('d-none');
    aviso.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>Relatório já enviado para <strong>${data}</strong> em ${new Date(res[0].postado_em).toLocaleString('pt-BR')}.`;
  } else {
    aviso.classList.add('d-none');
  }
}

// ── Enviar relatório ─────────────────────────────────────────────────────────
async function enviarRelatorio() {
  const alerta   = document.getElementById('alertaRel');
  const dataRef  = document.getElementById('dataRef').value;
  const cartoes  = document.querySelectorAll('.rota-card');

  if (!dataRef) { mostrarAlerta(alerta, 'danger', 'Informe a data de referência.'); return; }

  // Fazer upload dos arquivos NF antes de enviar
  mostrarAlerta(alerta, 'success', 'Enviando arquivos...');
  for (const c of cartoes) {
    const fileInput = c.querySelector('.inp-nf-file');
    const urlInput  = c.querySelector('.inp-nf-url');
    const status    = c.querySelector('.inp-nf-status');
    if (fileInput.files[0] && !urlInput.value) {
      status.textContent = '⏳ enviando...';
      const fd = new FormData();
      fd.append('nf', fileInput.files[0]);
      const up = await fetch('/api/upload/nf', { method: 'POST', body: fd });
      const ud = await up.json();
      if (up.ok) { urlInput.value = ud.url; status.textContent = '✅'; }
      else { status.textContent = '❌ ' + ud.erro; }
    }
  }

  const rotas = [...cartoes].map(c => ({
    numero_rota:          c.querySelector('.inp-rota').value.trim(),
    numero_f1:            c.querySelector('.inp-f1').value.trim()          || null,
    motorista_id:         c.querySelector('.sel-motorista').value           || null,
    ajudante_id:          c.querySelector('.sel-ajudante').value            || null,
    ajudante2_id:         c.querySelector('.sel-ajudante2').value           || null,
    mercadorias_faltando: c.querySelector('.inp-faltando').value.trim()    || null,
    nf_url:               c.querySelector('.inp-nf-url').value             || null,
    desconto_equipe:      c.querySelector('.chk-desconto').checked,
    motivo_desconto:      c.querySelector('.inp-motivo').value.trim()      || null,
    valor_desconto:       +c.querySelector('.inp-valor-desconto').value    || 0,
  }));

  if (rotas.some(r => !r.numero_rota)) { mostrarAlerta(alerta, 'danger', 'Preencha o número de todas as rotas.'); return; }

  const res  = await fetch('/api/relatorios', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ data_referencia: dataRef, rotas }) });
  const data = await res.json();

  if (!res.ok) { mostrarAlerta(alerta, 'danger', data.erro); return; }

  mostrarAlerta(alerta, 'success', 'Relatório enviado com sucesso!');
  await verificarData();
  await carregarHistorico();
}

function mostrarAlerta(el, tipo, msg) {
  el.className = `alert alert-${tipo}`;
  el.innerHTML = `<i class="bi bi-${tipo==='success'?'check-circle':'exclamation-circle'}-fill me-2"></i>${msg}`;
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 5000);
}

// ── Histórico ────────────────────────────────────────────────────────────────
async function carregarHistorico() {
  const rels = await fetch('/api/relatorios').then(r => r.json());
  const tb   = document.getElementById('tbHistorico');
  tb.innerHTML = rels.length === 0
    ? '<tr><td colspan="4" class="text-center text-muted">Nenhum relatório enviado</td></tr>'
    : rels.map(r => `
        <tr>
          <td>${r.data_referencia}</td>
          <td>${new Date(r.postado_em).toLocaleString('pt-BR')}</td>
          <td><span class="badge bg-secondary">${r.total_rotas} rota(s)</span></td>
          <td><button class="btn btn-outline-danger btn-sm" onclick="verDetalhe(${r.id})"><i class="bi bi-eye me-1"></i>Ver</button></td>
        </tr>`).join('');
}

async function verDetalhe(id) {
  const rel = await fetch(`/api/relatorios/${id}`).then(r => r.json());
  let html  = `<h6 class="fw-bold text-danger">Data: ${rel.data_referencia} — ${rel.base_nome}</h6>`;
  html += `<div class="table-responsive"><table class="table table-bordered table-sm">
    <thead><tr><th>Rota</th><th>Motorista</th><th>Ajudante</th><th>Saiu</th><th>Entregou</th><th>Devolveu</th><th>Vl.Recebido</th><th>Vl.Esperado</th><th>Faltando</th><th>Desconto</th><th>Vl.Desconto</th><th>Motivo</th><th>Obs</th></tr></thead><tbody>`;
  for (const r of rel.rotas) {
    html += `<tr>
      <td>${r.numero_rota}</td>
      <td>${r.motorista_nome||'—'}</td>
      <td>${r.ajudante_nome||'—'}</td>
      <td>${r.qtd_saiu}</td>
      <td>${r.qtd_entregou}</td>
      <td>${r.qtd_devolveu}</td>
      <td>R$ ${(+r.valor_recebido).toFixed(2)}</td>
      <td>R$ ${(+r.valor_esperado).toFixed(2)}</td>
      <td>${r.mercadorias_faltando||'—'}</td>
      <td>${r.desconto_equipe ? '<span class="badge badge-desconto">SIM</span>' : 'Não'}</td>
      <td>${r.valor_desconto > 0 ? `<span class="text-danger fw-bold">R$ ${(+r.valor_desconto).toFixed(2)}</span>` : '—'}</td>
      <td>${r.motivo_desconto||'—'}</td>
      <td>${r.observacoes||'—'}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  document.getElementById('corpoDetalhe').innerHTML = html;
  new bootstrap.Modal(document.getElementById('modalDetalhe')).show();
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/';
}
</script>
</body>
</html>
