<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coca-Cola F1 – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #d40000; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
    .logo-area { background: #d40000; border-radius: 16px 16px 0 0; padding: 32px; text-align: center; }
    .logo-text { color: #fff; font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; font-family: 'Georgia', serif; }
    .logo-sub  { color: rgba(255,255,255,.8); font-size: .95rem; margin-top: 4px; }
    .badge-f1  { background:#fff; color:#d40000; font-weight:900; font-size:1.1rem; padding:4px 14px; border-radius:20px; display:inline-block; margin-top:8px; }
    .btn-login { background:#d40000; border:none; font-weight:700; letter-spacing:1px; }
    .btn-login:hover { background:#b50000; }
    .form-control:focus { border-color:#d40000; box-shadow:0 0 0 .2rem rgba(212,0,0,.25); }
  </style>
</head>
<body>
  <div class="card" style="width:100%;max-width:420px">
    <div class="logo-area">
      <div class="logo-text">Coca&#8209;Cola</div>
      <div class="badge-f1">Sistema F1</div>
      <div class="logo-sub mt-2">Gestão de Entregas e Rotas</div>
    </div>
    <div class="card-body p-4">
      <h5 class="mb-3 fw-bold text-center text-muted">Acesso ao Sistema</h5>
      <div id="alerta" class="alert alert-danger d-none"></div>
      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="usuário da base" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="senha" class="form-control" placeholder="••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-login btn-danger w-100 py-2 fs-5">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
    </div>
    <div class="card-footer text-center text-muted small py-2">
      © 2024 Coca-Cola F1 &mdash; Sistema de Gestão de Rotas
    </div>
  </div>

  <script>
    document.getElementById('formLogin').addEventListener('submit', async e => {
      e.preventDefault();
      const alerta = document.getElementById('alerta');
      alerta.classList.add('d-none');

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ usuario: document.getElementById('usuario').value, senha: document.getElementById('senha').value })
        });
        const data = await res.json();
        if (!res.ok) { alerta.textContent = data.erro; alerta.classList.remove('d-none'); return; }
        window.location.href = data.isAdmin ? '/admin' : '/base';
      } catch {
        alerta.textContent = 'Erro de conexão. Tente novamente.';
        alerta.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
